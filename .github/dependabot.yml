version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Minor/patch de produção num PR só (ex.: astro, tailwindcss + @tailwindcss/vite
      # juntos). Bumps de major continuam em PRs separados, pra revisar com calma.
      production-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
